<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Tap 1-16</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding-top:20px;
    user-select:none;
}

h1{
    font-size:32px;
    margin:10px;
}

#timer{
    font-size:24px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,85px);
    gap:10px;
    justify-content:center;
}

.btn{
    width:85px;
    height:85px;
    border-radius:16px;
    font-size:30px;
    font-weight:bold;
    color:white;
    border:none;
    touch-action: manipulation;
    transition:0.05s;
}

.btn:active{
    transform:scale(0.92);
}

#reset{
    margin-top:25px;
    width:200px;
    height:50px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
}

.wrong{
    filter:brightness(0.5);
}

</style>

</head>

<body>

<h1 id="title">Tap 1 → 16</h1>

<div id="timer">0.00s</div>

<div class="grid" id="game"></div>

<button id="reset">Reiniciar</button>

<script>

const numeros = [
12,14,1,6,
4,13,11,16,
3,7,15,8,
2,10,9,5
];

const colores = {
12:"#F6C900",
14:"#4267D5",
1:"#D81B60",
6:"#F5A623",

4:"#35A9D6",
13:"#7414A8",
11:"#287FEA",
16:"#7BC96F",

3:"#3969D9",
7:"#E53935",
15:"#C62828",
8:"#8ED66B",

2:"#7B1FA2",
10:"#F4511E",
9:"#5B2BBF",
5:"#7CC9C9"
};

let siguiente = 1;
let startTime = null;
let timerInterval = null;

function startTimer(){
    startTime = Date.now();

    timerInterval = setInterval(()=>{
        let t = (Date.now() - startTime) / 1000;
        document.getElementById("timer").innerText = t.toFixed(2) + "s";
    }, 50);
}

function stopTimer(){
    clearInterval(timerInterval);
}

function buildGame(){

    const game = document.getElementById("game");
    game.innerHTML = "";

    siguiente = 1;
    startTime = null;
    stopTimer();
    document.getElementById("timer").innerText = "0.00s";

    numeros.forEach(n => {

        const b = document.createElement("button");
        b.className = "btn";
        b.innerText = n;
        b.style.background = colores[n];

        const press = () => {

            if(!startTime){
                startTimer();
            }

            if(n === siguiente){

                b.style.visibility = "hidden";
                siguiente++;

                if(siguiente === 17){
                    stopTimer();
                    document.getElementById("title").innerText =
                        "🔥 Terminaste en " +
                        document.getElementById("timer").innerText;
                }

            } else {

                // feedback rápido sin alert
                b.classList.add("wrong");
                setTimeout(()=>b.classList.remove("wrong"), 120);
            }
        };

        // ultra responsive en iPhone
        b.addEventListener("pointerdown", press);

        game.appendChild(b);
    });
}

document.getElementById("reset").onclick = () => {
    document.getElementById("title").innerText = "Tap 1 → 16";
    buildGame();
};

buildGame();

</script>

</body>
</html>
