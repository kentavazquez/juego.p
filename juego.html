<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Number Speed</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    margin:0;
    padding-top:20px;
}


h1{
    font-size:40px;
    margin-bottom:10px;
}


#timer{

    font-size:28px;
    margin:20px;

}



.grid{

    display:grid;
    grid-template-columns:repeat(4,80px);
    gap:12px;
    justify-content:center;

}



.number{

    width:80px;
    height:80px;
    border:none;
    border-radius:15px;
    font-size:32px;
    font-weight:bold;
    color:white;
    cursor:pointer;

    transition:0.1s;

}



.number:active{

    transform:scale(0.9);

}



#reset{

    margin-top:35px;
    width:220px;
    height:55px;
    border:none;
    border-radius:15px;
    font-size:22px;
    font-weight:bold;
    background:white;
    color:black;

}


</style>


</head>


<body>


<h1>0.0s</h1>


<div id="timer">
Tiempo: 0.0
</div>



<div class="grid" id="game"></div>



<button id="reset">
Reiniciar
</button>



<script>


let numeros=[

12,14,1,6,
4,13,11,16,
3,7,15,8,
2,10,9,5

];



let colores={

12:"#F6C900",
14:"#4267D5",
1:"#D81B60",
6:"#F5A623",

4:"#35A9D6",
13:"#7414A8",
11:"#287FEA",
16:"#7BC96F",

3:"#3969D9",
7:"#E53935",
15:"#C62828",
8:"#8ED66B",

2:"#7B1FA2",
10:"#F4511E",
9:"#5B2BBF",
5:"#7CC9C9"

};



let siguiente=1;

let tiempo=0;

let iniciado=false;

let intervalo;



function iniciarJuego(){


    siguiente=1;

    tiempo=0;

    iniciado=false;


    clearInterval(intervalo);



    document.getElementById("timer").innerHTML=
    "Tiempo: 0.0";



    let game=document.getElementById("game");

    game.innerHTML="";



    numeros.forEach(numero=>{


        let boton=document.createElement("button");


        boton.className="number";


        boton.innerHTML=numero;


        boton.style.background=colores[numero];



        boton.onclick=function(){



            // iniciar cronómetro al primer toque

            if(!iniciado){


                iniciado=true;


                intervalo=setInterval(()=>{


                    tiempo+=0.1;


                    document.getElementById("timer").innerHTML=
                    "Tiempo: "+
                    tiempo.toFixed(1);



                },100);


            }




            // número correcto

            if(numero===siguiente){



                boton.style.visibility="hidden";


                siguiente++;



                // terminó

                if(siguiente===17){



                    clearInterval(intervalo);



                    setTimeout(()=>{


                        alert(
                        "🎉 Terminaste en "+
                        tiempo.toFixed(1)+
                        " segundos"
                        );



                    },200);



                }



            }else{


                alert(
                "❌ Error. Toca el número "+
                siguiente
                );


            }



        };



        game.appendChild(boton);



    });



}




document
.getElementById("reset")
.onclick=iniciarJuego;



// iniciar al abrir

iniciarJuego();



</script>


</body>

</html>
